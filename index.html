    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 15%, #8b3a8f 30%, #4a148c 45%, #1565c0 60%, #00bcd4 75%, #4caf50 90%, #ffeb3b 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating color particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-100vh) scale(1.5);
                opacity: 0;
            }
        }

        .container {
            max-width: 500px;
            width: 90%;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .logo-container {
            margin-bottom: 25px;
        }

        .logo-container img {
            max-width: 280px;
            height: auto;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
        }

        h1 {
            font-size: 2.2rem;
            color: #c44569;
            margin: 20px 0 10px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .event-details {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .venue {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #8b3a8f;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
        }

        .venue:hover {
            background: rgba(139, 58, 143, 0.1);
            transform: scale(1.05);
        }

        .venue::before {
            content: "📍";
            font-size: 1.3rem;
        }

        }

            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            display: inline-block;
            padding-bottom: 10px;
        }

        .links-header h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #c44569, #8b3a8f);
            border-radius: 2px;

        .links-container {

            flex-direction: column;

        }

        .link-btn {

            padding: 16px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .link-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.3);

        }

        .link-btn.whatsapp {

            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 1;

            align-items: center;

            height: 100%;

        }

            flex: 1;
            text-align: left;
        }

            transition: transform 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .link-btn:hover .link-arrow {
            transform: translateX(5px);
        }

        .credit {

            bottom: 8px;
            right: 12px;
            font-size: 0.65rem;
            opacity: 0.4;
            transition: opacity 0.3s ease;
        }

        .credit:hover {

        }

            100% {
