<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rangover by LVRN - Holi Like Never Before</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 15%, #8b3a8f 30%, #4a148c 45%, #1565c0 60%, #00bcd4 75%, #4caf50 90%, #ffeb3b 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating color particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-100vh) scale(1.5);
                opacity: 0;
            }
        }

        .container {
            max-width: 500px;
            width: 90%;
            padding: 30px 30px 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .banner-container {
            width: 100%;
            margin-bottom: 20px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .banner-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        h1 {
            font-size: 2.2rem;
            color: #c44569;
            margin: 15px 0 10px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .event-details {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .venue {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #8b3a8f;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
        }

        .venue:hover {
            background: rgba(139, 58, 143, 0.1);
            transform: scale(1.05);
        }

        .venue::before {
            content: "📍";
            font-size: 1.3rem;
        }

        .links-header {
            margin-top: 25px;
            margin-bottom: 10px;
        }

        .links-header h2 {
            font-size: 1.4rem;
            color: #c44569;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            display: inline-block;
            padding-bottom: 10px;
        }

        .links-header h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #c44569, #8b3a8f);
            border-radius: 2px;
        }

        .links-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .link-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.3);
        }

        .link-btn.instagram {
            background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        .link-btn.bookmyshow {
            background: linear-gradient(135deg, #c92228 0%, #a01419 100%);
        }

        .link-btn.district {
            background: linear-gradient(135deg, #8b3a8f 0%, #6a2c6f 100%);
        }

        .link-btn.website {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .link-btn.whatsapp {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .platform-logo {
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 8px;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .platform-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .link-text {
            flex: 1;
            text-align: left;
        }

        .link-arrow {
            font-size: 1.2rem;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .link-btn:hover .link-arrow {
            transform: translateX(5px);
        }

        .credit {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 0.6rem;
            opacity: 0.35;
            transition: opacity 0.3s ease;
            text-align: right;
            line-height: 1.3;
        }

        .credit:hover {
            opacity: 0.65;
        }

        .credit a {
            color: #666;
            text-decoration: none;
        }

        .credit a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px 20px 35px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .event-details {
                font-size: 1rem;
            }

            .link-btn {
                padding: 14px 20px;
                font-size: 0.95rem;
            }

            .banner-container {
                margin-bottom: 15px;
            }

            .credit {
                font-size: 0.55rem;
                bottom: 6px;
                right: 8px;
            }
        }

        /* Animation for popup effect */
        @keyframes popIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .container {
            animation: popIn 0.6s ease-out;
        }

        .link-btn {
            animation: popIn 0.6s ease-out backwards;
        }

        .link-btn:nth-child(1) { animation-delay: 0.1s; }
        .link-btn:nth-child(2) { animation-delay: 0.2s; }
        .link-btn:nth-child(3) { animation-delay: 0.3s; }
        .link-btn:nth-child(4) { animation-delay: 0.4s; }
        .link-btn:nth-child(5) { animation-delay: 0.5s; }
    </style>
</head>
<body>
    <!-- Floating particles -->
    <script>
        // Create floating color particles
        const colors = ['#ff6b9d', '#c44569', '#8b3a8f', '#4a148c', '#1565c0', '#00bcd4', '#4caf50', '#ffeb3b'];
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 60 + 20 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.animationDuration = Math.random() * 4 + 4 + 's';
            document.body.appendChild(particle);
        }
    </script>
